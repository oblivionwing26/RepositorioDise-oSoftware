spring.application.name=esientradas
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

#BASE DE DATOS (ACCESO SI USAMOS SPRING)
#spring.datasource.url = jdbc:mysql://172.20.48.23:3306/gramola?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.url = jdbc:mysql://localhost:3306/esientradas?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username = root
spring.datasource.password = 12345678

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

server.error.include-message=always

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


app.esiusuarios.url=http://localhost:8081
app.prerreserva.expiration-minutes=10
app.prerreserva.cleanup-rate-ms=60000
app.cola.enabled=true
app.cola.active-minutes=5
app.cola.active-slots=1
app.cola.cleanup-rate-ms=5000
# Email real: configurar por variables de entorno, no con claves en el repositorio.
app.mail.from=${APP_MAIL_FROM:}
app.email.from=${APP_MAIL_FROM:}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# Stripe: usar las claves test/real mediante entorno. La clave privada no debe subirse al repo.
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.public-key=${STRIPE_PUBLIC_KEY:}
stripe.currency=${STRIPE_CURRENCY:eur}
