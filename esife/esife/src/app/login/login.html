<section class="auth-card">
  <h2>Iniciar sesión</h2>

  <form (ngSubmit)="submit(emailInput.value, passwordInput.value)" novalidate>
    <label>
      Email
      <input #emailInput type="email" name="email" [(ngModel)]="email" required />
    </label>

    <label>
      Contraseña
      <input #passwordInput type="password" name="password" [(ngModel)]="password" required />
    </label>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Entrando…' : 'Entrar' }}
    </button>
  </form>

  <p *ngIf="error" class="error">{{ error }}</p>

  <p class="links">
    <a routerLink="/register">Crear cuenta</a> ·
    <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
  </p>
</section>
