<section class="auth-card">
  <h2>Restablecer contraseña</h2>

  <form (ngSubmit)="submit()" novalidate>
    <label>
      Nueva contraseña
      <span class="password-field">
        <input
          #passwordInput
          [type]="mostrarPassword ? 'text' : 'password'"
          name="newPassword"
          [(ngModel)]="newPassword"
          required
          minlength="8"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="mostrarPassword = !mostrarPassword"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          [attr.title]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <span aria-hidden="true">👁</span>
        </button>
      </span>
    </label>

    <label>
      Repite la nueva contraseña
      <span class="password-field">
        <input
          #confirmInput
          [type]="mostrarConfirm ? 'text' : 'password'"
          name="confirm"
          [(ngModel)]="confirm"
          required
        />
        <button
          type="button"
          class="password-toggle"
          (click)="mostrarConfirm = !mostrarConfirm"
          [attr.aria-label]="mostrarConfirm ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          [attr.title]="mostrarConfirm ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <span aria-hidden="true">👁</span>
        </button>
      </span>
    </label>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Guardando…' : 'Cambiar contraseña' }}
    </button>
  </form>

  <p *ngIf="error" class="error">{{ error }}</p>
  <p *ngIf="ok" class="ok">Contraseña actualizada. Redirigiendo al login…</p>
</section>
