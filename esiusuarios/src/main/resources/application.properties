spring.application.name=esiusuarios
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

server.port=8081

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DBUsuarios;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Dinosaurio1226@
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

# JWT
app.jwt.secret=cambia_esta_clave_super_secreta_de_al_menos_32_bytes_1234
app.jwt.expiration-ms=86400000

# Recuperacion de contrasena
app.reset.expiration-minutes=15
app.reset.frontend-url=${APP_RESET_FRONTEND_URL:http://localhost:4200/reset-password}

# Email real: configurar por variables de entorno, no con claves en el repositorio.
app.mail.from=${APP_MAIL_FROM:}
app.email.from=${APP_MAIL_FROM:}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}
