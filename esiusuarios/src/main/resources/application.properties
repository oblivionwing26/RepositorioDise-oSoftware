spring.application.name=esiusuarios

server.port=8081

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DBUsuarios;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# Definir spring.datasource.username y spring.datasource.password
# como variables de entorno (DBU_USER, DBU_PASS) o en application-local.properties (no commitear).
spring.datasource.username=${DBU_USER:sa}
spring.datasource.password=${DBU_PASS:changeit}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JWT (cambiar la clave en produccion - debe tener >= 32 caracteres para HS256)
jwt.secret=${JWT_SECRET:cambia_esta_clave_super_secreta_de_al_menos_32_caracteres!!}
jwt.expiration-ms=3600000